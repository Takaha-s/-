<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>大学 WebAR ガイドシステム テスト</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000; /* 隙間ができた場合のために背景を黒にする */
        }
        
        .mindar-ui-overlay { z-index: 100; }
        
        /* 👇 カメラ映像を綺麗な9:16の比率に固定する設定 */
        video {
            width: 100vw !important;             /* 横幅は画面いっぱいに */
            height: calc(100vw * 16 / 9) !important; /* 横幅を基準に「9:16」の縦幅を自動計算 */
            object-fit: contain !important;       /* 映像が歪まないように比率を維持 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);   /* 画面の中央にぴったり配置 */
        }
    </style>
</head>
<body>
    
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no;" 
             embedded color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane color="#ffffff" opacity="0.9" position="0 0 0" width="1" height="0.4" rotation="0 0 0"></a-plane>
            <a-text value="1号館 (工学部)\nオープンキャンパスへようこそ！" color="#333333" align="center" width="2" position="0 0 0.01"></a-text>
        </a-entity>
        
    </a-scene>
</body>
</html>
