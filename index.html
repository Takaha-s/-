<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>大学 WebAR ガイドシステム テスト</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* CSSは極力シンプルにしてライブラリの自動調整に任せます */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000000;
        }
        .mindar-ui-overlay { z-index: 100; }
    </style>
</head>
<body>
    
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; filterMinCF:0.001; filterBeta: 1000;" 
             embedded color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane color="#ffffff" opacity="0.9" position="0 0 0" width="1" height="0.4" rotation="0 0 0"></a-plane>
            <a-text value="1号館 (工学部)\nオープンキャンパスへようこそ！" color="#333333" align="center" width="2" position="0 0 0.01"></a-text>
        </a-entity>
        
    </a-scene>
</body>
</html>
